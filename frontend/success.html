<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful — Support8</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f6f9fc; color: #1a1f36; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border: 1px solid #e3e8ee; border-radius: 16px; padding: 48px 40px; max-width: 440px; width: 90%; text-align: center; box-shadow: 0 12px 50px rgba(0,0,0,.08); }
        .check { width: 64px; height: 64px; background: rgba(48,177,48,.1); border-radius: 50%; display: grid; place-items: center; margin: 0 auto 20px; }
        .check svg { width: 32px; height: 32px; }
        h1 { font-size: 26px; margin-bottom: 8px; font-weight: 800; }
        p { color: #697386; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
        .status { font-size: 14px; margin-bottom: 20px; padding: 12px; border-radius: 10px; font-weight: 500; }
        .status-activating { background: rgba(99,91,255,.06); border: 1px solid rgba(99,91,255,.15); color: #635bff; }
        .status-done { background: rgba(48,177,48,.06); border: 1px solid rgba(48,177,48,.15); color: #30b130; }
        .status-err { background: rgba(223,27,65,.06); border: 1px solid rgba(223,27,65,.15); color: #df1b41; }
        .btn { display: inline-block; padding: 14px 40px; border-radius: 24px; background: #635bff; color: #fff; font-size: 15px; font-weight: 700; text-decoration: none; border: none; cursor: pointer; box-shadow: 0 2px 12px rgba(99,91,255,.25); transition: .15s; }
        .btn:hover { background: #7a73ff; }
        .logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 24px; }
        .logo b { font-size: 20px; font-weight: 700; color: #1a1f36; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #e3e8ee; border-top-color: #635bff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="logo"><svg width="32" height="32" viewBox="0 0 36 36" fill="none"><rect x="2" y="2" width="32" height="32" rx="8" fill="url(#lgS)"/><defs><linearGradient id="lgS" x1="0" y1="0" x2="36" y2="36"><stop offset="0%" stop-color="#635bff"/><stop offset="100%" stop-color="#7a73ff"/></linearGradient></defs><path d="M11 13a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 2.5V23a2 2 0 01-2-2v-8z" fill="#fff" opacity=".95"/></svg><b>Support8</b></div>

    <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="#30b130" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
    </div>

    <h1>Payment Successful!</h1>
    <p>Your payment has been received. We're activating your account now.</p>

    <div class="status status-activating" id="status">
        <span class="spinner"></span> Activating your account...
    </div>

    <a class="btn" id="go-btn" href="index.html" style="display:none">Go to Dashboard</a>
</div>

<script>
const API = 'https://mfvollvrkc.execute-api.us-east-2.amazonaws.com/prod';

window.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('s8_token');
    const statusEl = document.getElementById('status');
    const goBtn = document.getElementById('go-btn');
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    if (!token) {
        statusEl.className = 'status status-err';
        statusEl.innerHTML = 'You need to be logged in. <a href="index.html" style="color:#818cf8">Log in first</a>, then come back to this page.';
        if (sessionId) {
            localStorage.setItem('s8_pending_session', sessionId);
        }
        goBtn.textContent = 'Go to Login';
        goBtn.style.display = 'inline-block';
        return;
    }

    const sid = sessionId || localStorage.getItem('s8_pending_session');
    if (!sid) {
        statusEl.className = 'status status-err';
        statusEl.textContent = 'No payment session found. Please complete payment first.';
        return;
    }

    try {
        const r = await fetch(`${API}/company/activate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ session_id: sid })
        });
        const d = await r.json();

        if (d.activated) {
            localStorage.removeItem('s8_pending_session');
            statusEl.className = 'status status-done';
            statusEl.textContent = d.already_paid
                ? 'Your account is already active!'
                : 'Payment verified and account activated!';
            goBtn.style.display = 'inline-block';
        } else if (d.error) {
            statusEl.className = 'status status-err';
            statusEl.textContent = d.error;
        }
    } catch (e) {
        statusEl.className = 'status status-err';
        statusEl.textContent = 'Something went wrong. Please try refreshing.';
        goBtn.textContent = 'Try Again';
        goBtn.href = window.location.href;
        goBtn.style.display = 'inline-block';
    }
});
</script>
</body>
</html>
